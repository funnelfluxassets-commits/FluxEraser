            --bg: #f8fafc;

            --border: rgba(59, 130, 246, 0.3);
            --text-main: #0f172a;

            --success: #10b981;
            --mask-color: rgba(59, 130, 246, 0.4);
            --dot-color: rgba(148, 163, 184, 0.2);
            --spotlight-color: rgba(59, 130, 246, 0.45);
            --header-bg: #ffffff;
            --footer-bg: #ffffff;
        }

        .dark {
            --bg: #000000;
            --card-bg: rgba(2, 6, 23, 0.8);
            --border: rgba(59, 130, 246, 0.4);
            --text-main: #ffffff;
            --text-muted: #94a3b8;

        * {

            margin: 0;

        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);

            flex-direction: column;
            align-items: center;
            padding: 8rem 3rem 0 3rem; /* Removed bottom padding */

            position: relative;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dot-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            background-attachment: fixed;
            pointer-events: none;
            z-index: -1;
        }

        .dot-grid::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, var(--spotlight-color) 2px, transparent 2px);
            background-size: 32px 32px;
            mask-image: radial-gradient(circle 145px at var(--mouse-x, -100%) var(--mouse-y, -100%), black 0%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle 145px at var(--mouse-x, -100%) var(--mouse-y, -100%), black 0%, transparent 100%);
            z-index: -1;
        }

        .logo-container {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }

        .logo-container img {
            height: 90px;
            width: auto;
            display: block;
        }

        .hamburger {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 100;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            cursor: pointer;
            text-decoration: none;

        .hamburger span {

        }

        .content-header {

        h1 {

            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .gradient-text {
            background: linear-gradient(to right, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

        /* Standard Header Styles */

            left: 0;

        #brush-cursor {

        .action-btns {

        .btn {

        .btn:active {
            transform: scale(0.96);
        }

        .primary-btn {
            background: var(--gradient-highlight);
            color: #fff;
            box-shadow: 0 10px 25px rgba(146, 51, 234, 0.3);

            color: #fff;
            border: 1px solid var(--border);
        }

        #erase-btn:disabled {
            opacity: 0.4;
            cursor: wait;
        }

        .loader {
            position: absolute;
            inset: 0;
            background: var(--bg);
            opacity: 0.95;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(88, 94, 254, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;

        .badge {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            background: var(--primary);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            z-index: 20;
            letter-spacing: 0.1em;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: calc(3rem + 35px) 1.5rem 0 1.5rem;
            }

            .content-header {
                margin-bottom: 3rem;
                margin-top: 2rem;
            }

            h1 {
                font-size: 2.4rem;
            }

            .logo-container {
                top: 0.75rem;
                left: 0.75rem;

            }

            .logo-container img {
                height: 65px;
            }

            .hamburger {
                top: 0.75rem;
                right: 0.75rem;
            }

            .hamburger span {
                width: 24px;
                height: 2px;
            }

            .content-header {
                margin-top: 10px;
                margin-bottom: 1.25rem;
            }

            h1 {

            header p:first-of-type {

                margin-bottom: 0.25rem;
            }

            header p:last-of-type {

            .main-card {
                padding: 1rem;

            }

            .upload-area {
                aspect-ratio: 3 / 4;
                height: auto;
            }

            .toolbar {
                flex-direction: column;
                padding: 1rem 0.5rem;
                gap: 1.25rem;
            }

            .tool-group {
                width: 100%;
                justify-content: center;
                gap: 0.75rem;
            }

            #brush-size {
                flex: 1;
                max-width: 180px;
            }

            .action-btns {
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }

            .btn {
                width: 100%;
                padding: 0.9rem;
                font-size: 1rem;
            }

            .badge {
                top: 0.5rem;
                right: 0.5rem;
                font-size: 0.55rem;
                padding: 0.25rem 0.5rem;
            }
            .site-footer {
                width: 100vw;
                margin-left: -1.5rem;
                margin-right: -1.5rem;
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        function setTheme(isDark) {
            if (isDark) {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme(false);
        } else {
            // Default to dark for premium feel
            setTheme(true);
        }

        themeToggle.onclick = () => {
            setTheme(!html.classList.contains('dark'));
        };

        // Spotlight Effect
        window.addEventListener('mousemove', (e) => {
            document.body.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.body.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        const API_BASE = "https://funnelfluxassets-fluxeraser-brain.hf.space"; // Global AI Brain
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const editPortal = document.getElementById('edit-portal');
        const bgImage = document.getElementById('bg-image');
        const canvas = document.getElementById('brush-canvas');
        const buffer = document.getElementById('mask-buffer');
        const ctx = canvas.getContext('2d');
        const bCtx = buffer.getContext('2d');
        const brushSizeInput = document.getElementById('brush-size');
        const eraseBtn = document.getElementById('erase-btn');
        const clearAllBtn = document.getElementById('clear-all');
        const actionArea = document.getElementById('action-area');
        const downloadBtn = document.getElementById('download-btn');
        const loader = document.getElementById('loader');
        const loaderStatus = document.getElementById('loader-status');
        const brushCursor = document.getElementById('brush-cursor');

        const btnBrush = document.getElementById('btn-brush');
        const btnEraser = document.getElementById('btn-eraser');

        let isDrawing = false;
        let originalFile = null;
        let currentMode = null; // Set to null initially so users can scroll without drawing

        btnBrush.onclick = () => { currentMode = 'brush'; btnBrush.classList.add('active'); btnEraser.classList.remove('active'); };
        btnEraser.onclick = () => { currentMode = 'eraser'; btnEraser.classList.add('active'); btnBrush.classList.remove('active'); };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                originalFile = file;
                const url = URL.createObjectURL(file);
                bgImage.src = url;
                bgImage.onload = () => {
                    canvas.width = bgImage.naturalWidth;
                    canvas.height = bgImage.naturalHeight;
                    buffer.width = canvas.width;
                    buffer.height = canvas.height;
                    bCtx.fillStyle = 'black';
                    bCtx.fillRect(0, 0, buffer.width, buffer.height);
                    dropZone.style.display = 'none';
                    editPortal.style.display = 'block';
                    actionArea.style.display = 'flex';
                    syncCanvasScale();
                };
            }
        };

        function syncCanvasScale() {
            canvas.style.width = bgImage.offsetWidth + 'px';
            canvas.style.height = bgImage.offsetHeight + 'px';
            canvas.style.left = bgImage.offsetLeft + 'px';
            canvas.style.top = bgImage.offsetTop + 'px';
        }

        window.onresize = syncCanvasScale;

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            // Mobile Finger Handling
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getCoords(e);

            // Apply Brush size
            const size = brushSizeInput.value;

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalCompositeOperation = currentMode === 'brush' ? 'source-over' : 'destination-out';
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.7)';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            bCtx.lineWidth = size;
            bCtx.lineCap = 'round';
            bCtx.lineJoin = 'round';
            bCtx.globalCompositeOperation = currentMode === 'brush' ? 'source-over' : 'destination-out';
            bCtx.strokeStyle = 'white';
            bCtx.lineTo(pos.x, pos.y);
            bCtx.stroke();
            bCtx.beginPath();
            bCtx.moveTo(pos.x, pos.y);
        }

        // EVENT LISTENERS - Unified for Cursor & Finger
        canvas.addEventListener('mousedown', (e) => {
            if (!currentMode) return;
            isDrawing = true;
            draw(e);
        });
        canvas.addEventListener('mousemove', (e) => {
            updateCursor(e);
            if (!currentMode) return;
            draw(e);
        });

        canvas.addEventListener('mouseenter', () => {
            brushCursor.style.display = 'block';
        });

        canvas.addEventListener('mouseleave', () => {
            brushCursor.style.display = 'none';
        });

        function updateCursor(e) {
            // Calculate size based on input and scale
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / canvas.width;
            const size = brushSizeInput.value * scaleX;

            brushCursor.style.width = size + 'px';
            brushCursor.style.height = size + 'px';
            brushCursor.style.left = e.clientX + 'px';
            brushCursor.style.top = e.clientY + 'px';
        }

        brushSizeInput.oninput = () => {
            // Cursor size update is handled by mousemove, but let's force a size preview if needed
        };

        canvas.addEventListener('touchstart', (e) => {
            if (!currentMode) return;
            e.preventDefault();
            isDrawing = true;
            draw(e);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!currentMode) return;
            e.preventDefault();
            draw(e);
        }, { passive: false });

        window.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); bCtx.beginPath(); });
        window.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); bCtx.beginPath(); });

        clearAllBtn.onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bCtx.fillStyle = 'black';
            bCtx.fillRect(0, 0, buffer.width, buffer.height);
        };

        eraseBtn.onclick = async () => {
            eraseBtn.disabled = true;
            loader.style.display = 'flex';
            loaderStatus.textContent = "OPTIMIZING IMAGE FOR CLOUD...";

            // CLOUD OPTIMIZER: Scale the image down to exactly the canvas size
            // This prevents the AI from choking on 12-Megapixel phone photos
            const downscaledCanvas = document.createElement('canvas');
            downscaledCanvas.width = canvas.width;
            downscaledCanvas.height = canvas.height;
            const dsCtx = downscaledCanvas.getContext('2d');
            dsCtx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

            downscaledCanvas.toBlob(async (imageBlob) => {
                const formData = new FormData();
                formData.append('image', imageBlob, 'optimized_image.jpg');
                formData.append('mask', buffer.toDataURL('image/png'));

                try {
                    loaderStatus.textContent = "SYNTHESIZING PIXELS IN CLOUD...";
                    // UNIFIED API GATEWAY
                    const response = await fetch(`${API_BASE}/erase`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    console.log("AI Response:", data);

                    if (data.status === 'success') {
                        loaderStatus.textContent = "DEEP-CLEAN COMPLETE!";
                        const filename = data.final_file_name; // USING NEW KEY
                        const resultUrl = `${API_BASE}/outputs/${filename}?t=${Date.now()}`;

                        const resImg = new Image();
                        resImg.src = resultUrl;
                        resImg.onload = () => {
                            bgImage.src = resultUrl;
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            bCtx.fillStyle = 'black';
                            bCtx.fillRect(0, 0, buffer.width, buffer.height);
                            loader.style.display = 'none';
                            eraseBtn.textContent = "✓ Success!";
                            eraseBtn.style.background = "var(--success)";

                            // Reset mode to prevent accidental brushing after process
                            currentMode = null;
                            btnBrush.classList.remove('active');
                            btnEraser.classList.remove('active');

                            // Show download button
                            downloadBtn.style.display = 'flex';

                            setTimeout(() => {
                                eraseBtn.textContent = "⚡ Erase Brushed Area";
                                eraseBtn.style.background = "var(--gradient-highlight)";
                                eraseBtn.disabled = false;
                            }, 2000);
                        };
                        resImg.onerror = () => {
                            loader.style.display = 'none';
                            alert(`AI completed, but browser failed to load image from: ${resultUrl}`);
                            eraseBtn.disabled = false;
                        };
                    } else {
                        alert('AI Engine Error: ' + (data.error || "Unknown Error"));
                        loader.style.display = 'none';
                        eraseBtn.disabled = false;
                    }
                } catch (err) {
                    alert('Cloud Connection Error: Ensure you have "Allow Insecure Content" enabled if on tracking domains, or check internet.');
                    loader.style.display = 'none';
                    eraseBtn.disabled = false;
                }
            }, 'image/jpeg', 0.95);
        };

        downloadBtn.onclick = async () => {
            try {
                const response = await fetch(bgImage.src);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = `purified_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();

                // Cleanup
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
            } catch (err) {
                console.error("Download failed:", err);
                alert("Download failed. You can right-click the image and 'Save As' to download manually.");
            }
        };
    </script>
</body>

</html>
